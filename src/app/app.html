<header>
  <div class="content">
    <p>Bowling game</p>
  </div>
</header>
<main>
  <div style="display: grid; grid-template-columns: 50% 50%; column-gap: 20px; grid-auto-rows: 1fr 0.5fr;">
    <div>
      @for (frame of frames; track frame.index) {
        <app-frame [frame]="frame"></app-frame>
      }
    </div>
    <div>
      <h4>Roll1 </h4><input pInputText id="roll1" type="number" [(ngModel)]="inputRoll"/>
      <p-button label="Check" (click)="updateFrames()"/>
    </div>
  </div>
</main>
