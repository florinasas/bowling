<div [ngClass]="{
  'frame': isNew(),
  'frame-closed': isClosed(),
  'frame-spare': isSpare(),
  'frame-strike': isStrike()
}">
  <h4>Frame {{ frame.index }}</h4>
  <div>Roll1: {{ frame.roll1 }}</div>
  <div>Roll2: {{ frame.roll2 }}</div>
  <div>Score: {{ frame.score }}</div>
  <div>Status: {{ frame.status }}</div>
</div>
